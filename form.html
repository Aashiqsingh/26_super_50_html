<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <fieldset>
        <legend>Personal Details</legend>
    <form action="thankyou.html" method="post">
        <table>
            <tr>
                <td>Name</td>
                <td><input type="text" name="name" id="" require placeholder="Enter name"></td>
            </tr>
            <tr>
                <td>Surname</td>
                <td><input type="" name="sname" id=""></td>
            </tr>
            <tr>
                <td>Age</td>
                <td><input type="number" name="age" id=""></td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="tel" name="" id=""></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="" id=""></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="pass" id=""></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    Male <input type="radio" name="gender" value="male" id="">
                    Female <input type="radio" name="gender" value="female" id="">
                    Other <input type="radio" name="gender" id="" value="other">
                </td>
            </tr>
            <tr>
                <td>Hobbies</td>
                <td>
                    Cricket <input type="checkbox" name="hobby" value="cricket" id="">
                    Football <input type="checkbox" name="hobby" value="football" id="">
                    Basketball <input type="checkbox" name="hobby" id="" value="basketball">
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="Add" rows="5" cols="20" id=""></textarea></td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" name="" id=""></td>
                <!-- <td><input type="time" name="" id=""></td>
                <td><input type="datetime-local" name="" id=""></td>
                <td><input type="month" name="" id=""></td>
                <td><input type="week" name="" id=""></td> -->
            </tr>
            <tr>
                <td>Salary</td>
                <td><input type="range" name="sal" id=""></td>
            </tr>
            <tr>
                <td>color</td>
                <td><input type="color" name="" id=""></td>
            </tr>
            <tr>
                <td>City</td>
                <td>
                    <select name="city" id="">
                        <optgroup label="gujarat">
                            <option value="" selected disabled>--select city--</option>
                            <option value="surat">Surat</option>
                            <option value="ahmedabad" disabled>Ahemdabad</option>
                            <option value="bharuch">Bharuch</option>
                            <option value="vadodara">Vadodara</option>
                        </optgroup>
                        <optgroup label="maharastra" disabled>
                            <option value="mumbai">Mumbai</option>
                            <option value="pune">Pune</option>
                            <option value="nagpur">Nagpur</option>
                            <option value="bangalore">Bangalore</option>
                        </optgroup>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Attach document</td>
                <td><input type="file" name="" id=""></td>
            </tr>
            <tr>
                <td><input type="submit" value="submit" name="" id=""></td>
                <td><input type="reset" name="" id=""></td>
                <!-- <td><button>Submit</button></td> -->
            </tr>
        </table>
    </form>

</fieldset>
    
</body>
</html>
